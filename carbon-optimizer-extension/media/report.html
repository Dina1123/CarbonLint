<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carbon Optimizer Report</title>
  <style>
    /* ── Base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--vscode-font-family, sans-serif);
      font-size: var(--vscode-font-size, 13px);
      color: var(--vscode-foreground);
      background: var(--vscode-editor-background);
      padding: 0;
      margin: 0;
    }

    /* ── Panel header (always visible) ─────────────────────────────── */
    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--vscode-panel-border, #333);
      background: var(--vscode-sideBar-background, #252526);
    }
    .panel-header-icon { font-size: 20px; }
    .panel-header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--vscode-foreground);
    }
    .panel-header-sub {
      font-size: 11px;
      color: var(--vscode-descriptionForeground, #888);
      margin-top: 1px;
    }

    /* ── Scrollable content area ────────────────────────────────────── */
    #content { padding: 16px; }

    /* ── State screens (no-file, ready, loading) ────────────────────── */
    .state-screen {
      text-align: center;
      padding: 32px 16px;
    }
    .state-icon {
      font-size: 36px;
      margin-bottom: 12px;
      display: block;
    }
    .state-screen h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }
    .state-screen p {
      color: var(--vscode-descriptionForeground, #888);
      margin: 0 auto 16px;
      max-width: 320px;
      line-height: 1.5;
    }
    .info-box {
      background: var(--vscode-editor-lineHighlightBackground, #2a2a2a);
      border: 1px solid var(--vscode-panel-border, #444);
      border-radius: 6px;
      padding: 12px 16px;
      text-align: left;
      display: inline-block;
      margin-top: 8px;
      max-width: 340px;
    }
    .info-box ul {
      margin: 6px 0 0;
      padding-left: 18px;
      color: var(--vscode-descriptionForeground, #888);
      line-height: 1.7;
    }

    /* ── File pill ──────────────────────────────────────────────────── */
    .file-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--vscode-badge-background, #1e3a5f);
      color: var(--vscode-badge-foreground, #fff);
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ── Report toolbar (filename + re-run) ─────────────────────────── */
    .report-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    /* ── Intro sentence ─────────────────────────────────────────────── */
    .report-intro {
      color: var(--vscode-descriptionForeground, #888);
      line-height: 1.5;
      margin-bottom: 20px;
      padding: 10px 12px;
      background: var(--vscode-editor-lineHighlightBackground, #2a2a2a);
      border-radius: 6px;
      border-left: 3px solid var(--vscode-textLink-foreground, #4fc3f7);
    }

    /* ── Report sections ────────────────────────────────────────────── */
    .report-section {
      margin-bottom: 24px;
      border: 1px solid var(--vscode-panel-border, #333);
      border-radius: 8px;
      overflow: hidden;
    }
    .section-heading {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      background: var(--vscode-sideBar-background, #252526);
      border-bottom: 1px solid var(--vscode-panel-border, #333);
    }
    .section-icon { font-size: 18px; line-height: 1.4; }
    .section-heading h3 {
      margin: 0 0 2px;
      font-size: 13px;
      font-weight: 600;
    }
    .section-desc {
      margin: 0;
      color: var(--vscode-descriptionForeground, #888);
      font-size: 12px;
      line-height: 1.4;
    }
    .report-section > table,
    .report-section > .code-block,
    .report-section > .summary-box,
    .report-section > .code-toolbar { padding: 0 14px; }

    /* ── Tables ─────────────────────────────────────────────────────── */
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
      font-size: 12px;
    }
    th {
      text-align: left;
      padding: 7px 10px;
      background: var(--vscode-editor-lineHighlightBackground, #2a2a2a);
      color: var(--vscode-descriptionForeground, #aaa);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--vscode-panel-border, #2a2a2a);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    .highlight-row td {
      background: var(--vscode-editor-lineHighlightBackground, #1e2a1e);
    }

    /* ── Context / muted text ───────────────────────────────────────── */
    .context {
      color: #4caf50;
      font-size: 11px;
    }
    .muted {
      color: var(--vscode-descriptionForeground, #888);
      font-size: 11px;
    }

    /* ── Improvement values ─────────────────────────────────────────── */
    .improvement-positive { color: #4caf50; font-weight: 700; }
    .improvement-negative { color: #f44336; font-weight: 700; }

    /* ── Savings section ────────────────────────────────────────────── */
    .savings-section { border-color: #2d4a2d; }
    .savings-section .section-heading {
      background: #1e2a1e;
      border-bottom-color: #2d4a2d;
    }
    .summary-box {
      margin: 0 14px 14px;
      background: var(--vscode-editor-lineHighlightBackground, #2a2a2a);
      border-left: 3px solid #4caf50;
      border-radius: 0 4px 4px 0;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--vscode-foreground);
    }

    /* ── Code block ─────────────────────────────────────────────────── */
    .code-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--vscode-panel-border, #333);
    }
    .code-label {
      font-size: 11px;
      color: var(--vscode-descriptionForeground, #888);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .code-actions { display: flex; gap: 6px; }
    .code-block {
      background: var(--vscode-textCodeBlock-background, #1e1e1e);
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: var(--vscode-editor-font-size, 12px);
      white-space: pre-wrap;
      overflow-x: auto;
      padding: 12px 14px;
      margin: 0;
      max-height: 320px;
      overflow-y: auto;
    }

    /* ── Buttons ────────────────────────────────────────────────────── */
    button {
      background: var(--vscode-button-background, #0e639c);
      color: var(--vscode-button-foreground, #fff);
      border: none;
      padding: 7px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    button:hover { background: var(--vscode-button-hoverBackground, #1177bb); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: var(--vscode-button-secondaryBackground, #3a3d41);
      color: var(--vscode-button-secondaryForeground, #ccc);
    }
    .btn-secondary:hover { background: var(--vscode-button-secondaryHoverBackground, #45494e); }

    .action-btn {
      background: var(--vscode-button-secondaryBackground, #3a3d41);
      color: var(--vscode-button-secondaryForeground, #ccc);
      border: 1px solid var(--vscode-panel-border, #555);
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 11px;
    }
    .action-btn:hover { background: var(--vscode-button-secondaryHoverBackground, #45494e); }

    /* ── Config issue cards ─────────────────────────────────────────── */
    .config-issue {
      border: 1px solid var(--vscode-panel-border, #444);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .config-issue-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .badge {
      border-radius: 3px;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .badge-high   { background: #5a1d1d; color: #f44336; }
    .badge-medium { background: #3a2800; color: #ff9800; }
    .badge-low    { background: #1a3a1a; color: #4caf50; }

    /* ── Error ──────────────────────────────────────────────────────── */
    .error-message {
      color: var(--vscode-errorForeground, #f44336);
      background: var(--vscode-inputValidation-errorBackground, #5a1d1d);
      border: 1px solid var(--vscode-inputValidation-errorBorder, #be1100);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    /* ── Spin animation for loading ─────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 1.5s linear infinite; will-change: transform; }
  </style>
</head>
<body>
  <div class="panel-header">
    <div class="panel-header-icon">🌱</div>
    <div>
      <div class="panel-header-title">Carbon Optimizer</div>
      <div class="panel-header-sub">Energy &amp; CO₂ footprint analysis for Python</div>
    </div>
  </div>

  <div id="content">
    <div class="state-screen">
      <div class="state-icon">🌱</div>
      <h3>Carbon Optimizer</h3>
      <p>Open a <strong>.py</strong> file in the editor to get started.</p>
    </div>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    vscode.postMessage({ command: 'ready' });

    document.addEventListener('click', (e) => {
      const target = e.target;
      if (!target) return;

      if (target.id === 'optimize-btn') {
        target.disabled = true;
        target.textContent = 'Analyzing…';
        vscode.postMessage({ command: 'optimize' });
      }

      if (target.id === 'copy-btn') {
        const codeEl = document.getElementById('optimized-code');
        if (codeEl) {
          vscode.postMessage({ command: 'copy', code: codeEl.textContent || '' });
        }
      }

      if (target.id === 'apply-btn') {
        const codeEl = document.getElementById('optimized-code');
        if (codeEl) {
          target.disabled = true;
          target.textContent = 'Applying…';
          vscode.postMessage({ command: 'apply', code: codeEl.textContent || '' });
        }
      }
    });

    window.addEventListener('message', (event) => {
      const message = event.data;
      if (message.command === 'setContent') {
        document.getElementById('content').innerHTML = message.html;
      } else if (message.command === 'copyResult') {
        const btn = document.getElementById('copy-btn');
        if (btn) {
          const orig = btn.textContent;
          btn.textContent = '✓ Copied!';
          setTimeout(() => { btn.textContent = orig; }, 2000);
        }
      } else if (message.command === 'applyResult') {
        const btn = document.getElementById('apply-btn');
        if (btn) {
          btn.disabled = false;
          if (message.success) {
            btn.textContent = '✓ Applied!';
            setTimeout(() => { btn.textContent = '↙ Apply to File'; }, 3000);
          } else {
            btn.textContent = '↙ Apply to File';
          }
        }
      }
    });
  </script>
</body>
</html>
