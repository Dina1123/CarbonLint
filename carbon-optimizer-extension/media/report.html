<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carbon Optimizer Report</title>
  <style>
    body {
      font-family: var(--vscode-font-family, sans-serif);
      font-size: var(--vscode-font-size, 13px);
      color: var(--vscode-foreground);
      background: var(--vscode-editor-background);
      padding: 16px;
      margin: 0;
    }
    h2 { color: var(--vscode-textLink-foreground); margin-top: 0; }
    h3 { margin-bottom: 4px; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
    th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--vscode-panel-border, #444); }
    th { background: var(--vscode-editor-lineHighlightBackground, #2a2a2a); }
    .improvement-positive { color: #4caf50; font-weight: bold; }
    .improvement-negative { color: #f44336; font-weight: bold; }
    .code-block {
      background: var(--vscode-textCodeBlock-background, #1e1e1e);
      border: 1px solid var(--vscode-panel-border, #444);
      border-radius: 4px;
      padding: 12px;
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: var(--vscode-editor-font-size, 12px);
      white-space: pre-wrap;
      overflow-x: auto;
      margin-bottom: 16px;
    }
    button {
      background: var(--vscode-button-background, #0e639c);
      color: var(--vscode-button-foreground, #fff);
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 16px;
    }
    button:hover { background: var(--vscode-button-hoverBackground, #1177bb); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading { color: var(--vscode-descriptionForeground); font-style: italic; }
    .error-message {
      color: var(--vscode-errorForeground, #f44336);
      background: var(--vscode-inputValidation-errorBackground, #5a1d1d);
      border: 1px solid var(--vscode-inputValidation-errorBorder, #be1100);
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .summary { 
      background: var(--vscode-editor-lineHighlightBackground, #2a2a2a);
      border-left: 4px solid var(--vscode-textLink-foreground, #4fc3f7);
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 0 4px 4px 0;
    }
    .config-issue {
      border: 1px solid var(--vscode-panel-border, #444);
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .badge-high { color: #f44336; font-weight: bold; }
    .badge-medium { color: #ff9800; font-weight: bold; }
    .badge-low { color: #4caf50; font-weight: bold; }
    #content { }
  </style>
</head>
<body>
  <h2>🌱 Carbon Optimizer</h2>
  <div id="content">
    <p class="loading">Open a Python file and click "Optimize" to see the report.</p>
  </div>
  <script>
    const vscode = acquireVsCodeApi();
    vscode.postMessage({ command: 'ready' });

    document.addEventListener('click', (e) => {
      if (e.target && e.target.id === 'optimize-btn') {
        e.target.disabled = true;
        e.target.textContent = 'Optimizing…';
        vscode.postMessage({ command: 'optimize' });
      }
    });

    window.addEventListener('message', (event) => {
      const message = event.data;
      if (message.command === 'setContent') {
        document.getElementById('content').innerHTML = message.html;
      }
    });
  </script>
</body>
</html>
